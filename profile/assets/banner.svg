  <rect width="1280" height="420" rx="34" fill="url(#panel)"/>
  <rect width="1280" height="420" rx="34" fill="url(#glowA)"/>
  <rect width="1280" height="420" rx="34" fill="url(#glowB)"/>

  <g opacity="0.36">
