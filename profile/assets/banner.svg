  <g transform="translate(762 302)">
    <rect width="144" height="42" rx="21" fill="#F7F4EE" fill-opacity="0.1" stroke="#F7F4EE" stroke-opacity="0.18"/>
    <text class="tag" x="24" y="27">SKILLS</text>
  </g>
  <g transform="translate(932 302)">
