<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">iwantools AI Coding Operating System</title>
  <desc id="desc">A premium banner for iwantools, a one-person company building an AI coding operating system.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111417"/>
      <stop offset="0.58" stop-color="#18201F"/>
      <stop offset="1" stop-color="#0D1117"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(935 90) rotate(125) scale(420 240)">
      <stop stop-color="#F2A51A" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#F2A51A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(360 325) rotate(-25) scale(360 210)">
      <stop stop-color="#2F8580" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#2F8580" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <style>
      .paper { fill: #F7F4EE; }
      .ink { fill: #111417; }
      .amber { fill: #F2A51A; }
      .teal { fill: #2F8580; }
      .muted { fill: #B8C0C2; }
      .line { stroke: #F7F4EE; stroke-opacity: 0.12; }
      .wordmark {
        font-family: Inter, Avenir Next, Helvetica Neue, Arial, sans-serif;
        font-size: 82px;
        font-weight: 760;
        letter-spacing: 0;
        fill: #F7F4EE;
      }
      .headline {
        font-family: Inter, Avenir Next, Helvetica Neue, Arial, sans-serif;
        font-size: 32px;
        font-weight: 650;
        letter-spacing: 0;
        fill: #F7F4EE;
      }
      .copy {
        font-family: Inter, Avenir Next, Helvetica Neue, Arial, sans-serif;
        font-size: 20px;
        font-weight: 460;
        letter-spacing: 0;
        fill: #B8C0C2;
      }
      .tag {
        font-family: Inter, Avenir Next, Helvetica Neue, Arial, sans-serif;
        font-size: 18px;
        font-weight: 680;
        letter-spacing: 0.8px;
        fill: #F7F4EE;
      }
    </style>
